# ─────────────────────────────────────────────────────────────
# BU DOSYA SADECE ÖRNEKTİR — EKLENTİ TARAFINDAN YÜKLENMEZ.
# Yeni bir sistem eklerken bu dosyayı referans alarak
# langs/<sistem>.yml dosyası oluştur (örnek: langs/tpa.yml).
# ─────────────────────────────────────────────────────────────
#
# Mesaj formatı:
#   <anahtar>:
#     type: warning | error | normal | success
#     text: "Mesaj metni. {belirteç} dinamik veriler için kullanılır."

no-permission:
  type: error
  text: "Bu komutu kullanma yetkin yok!"

cooldown:
  type: warning
  text: "Lütfen hareket etmeden {seconds} bekle!"

claim-info:
  type: normal
  text: "{claimblocks} Blok daha claim alabilirsin."

command-blocked:
  type: error
  text: "Bu dünyada {command} komutunu kullanman yasaktır!"

success:
  type: success
  text: "İşlem başarılı!"
