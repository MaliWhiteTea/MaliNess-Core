  text: "Kullanım: /eco <give|take|set|reset|info|server> ..."

eco-info:
  type: normal
  text: "{player} · {currency}: {balance}"

eco-server-info:
  type: normal
  text: "Sunucu cüzdanı: {balance}"

eco-success:
  type: success
  text: "{player} güncellendi. Yeni bakiye: {balance}"

eco-reset-success:
  type: success
  text: "{player} bakiyesi sıfırlandı. Yeni bakiye: {balance}"

eco-failed:
  type: error
  text: "İşlem başarısız: {reason}"

gui-invalid-amount:
  type: error
  text: "Geçersiz menü ücreti."

gui-withdraw-success:
  type: success
  text: "Ödeme alındı: {amount}"

gui-deposit-success:
  type: success
  text: "Para eklendi: {amount}"

gui-transaction-failed:
  type: error
  text: "Menü işlemi başarısız: {reason}"
