lang-version: 3

no-permission:
  type: error
  text: "Bu komutu kullanma yetkin yok."

economy-unavailable:
  type: error
  text: "Ekonomi sistemi şu anda kullanılamıyor!"

player-only:
  type: error
  text: "Bu komut yalnızca oyuncular içindir."

player-not-found:
  type: error
  text: "Oyuncu bulunamadı: {player}"

currency-not-found:
  type: error
  text: "Para birimi bulunamadı: {currency}"

currency-disabled:
  type: error
  text: "Bu para birimi ile transfer yapılamaz."

invalid-amount:
  type: error
  text: "Geçersiz miktar."

insufficient-funds:
  type: error
  text: "Yetersiz bakiye! Bunun için {shortfall} daha ihtiyacın var. Şu anki bakiyen: {balance}."

pay-usage:
