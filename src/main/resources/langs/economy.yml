  text: "Kullanım: /pay <oyuncu> <miktar>"

pay-self:
  type: error
  text: "Kendine para gönderemezsin."

pay-invalid-amount:
  type: error
  text: "Geçersiz miktar. Min: {min} · Max: {max}"

pay-confirm:
  type: warning
  text: "{target} oyuncusuna {amount} göndermek istiyor musun? (Vergi: {tax})"

pay-confirm-large:
  type: warning
  text: "Büyük transfer: {target} oyuncusuna {amount} göndermek istiyor musun? (Vergi: {tax})"

pay-confirm-offline:
  type: warning
  text: "{target} şu anda çevrimdışı. Yine de {amount} göndermek istiyor musun? (Vergi: {tax})"

pay-sent:
  type: success
  text: "{target} oyuncusuna {amount} gönderildi."

pay-received:
  type: success
  text: "{sender} sana {amount} gönderdi."

pay-failed:
  type: error
  text: "Transfer başarısız: {reason}"

balance-self:
  type: normal
  text: "Bakiyen: {balance}"

balance-other:
  type: normal
  text: "{player} bakiyesi: {balance}"

