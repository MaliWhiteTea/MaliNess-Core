# MaliNess Core - Genel ayarlar
#
# Ana mesajlar       -> plugins/MaliNess-Core/pluginlang.yml
# Sistem mesajları    -> plugins/MaliNess-Core/langs/<sistem>.yml  (örn: tpa.yml)
# Sistem ayarları     -> plugins/MaliNess-Core/configs/<sistem>.yml (örn: tpa.yml)
#
# Not: langs/example.yml sadece şablondur, eklenti tarafından yüklenmez.
# Jar güncellendiğinde yeni ayarlar mevcut dosyalara otomatik eklenir (eski değerler korunur).

messages:
  prefix: "&#992fe0ᴍᴀʟɪɴᴇꜱꜱ ɴᴇᴛᴡᴏʀᴋ &f| "
  colors:
    warning: "&#ffd400"
    error: "&#ff1100"
    normal: "&#f3e9e3"
    success: "&#87d498"
    token: "&#ffdb57"

integrations:
  placeholderapi:
    enabled: true
    parse-in-messages: true
    labels:
      on: "Açık"
      off: "Kapalı"
      yes: "Evet"
      no: "Hayır"
