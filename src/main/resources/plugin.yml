name: MaliNess-Core
description: MaliNess Network çekirdek eklentisi.
version: '${project.version}'

main: com.mertaliakcay.malinesscore.MaliNessCore
api-version: '1.21.4'
load: POSTWORLD

softdepend:
  - PlaceholderAPI
  - ProtocolLib

authors: [ Mert Ali AKÇAY ]
website: https://github.com/MaliWhiteTea/MaliNess-Core

commands:
  maliness:
    description: MaliNess Network komutlari.
    usage: /mn <reload|heal|feed|health|hunger|saturate|saturation|god|sethome|home|delhome|homes|renamehome|systems|system|...>
    aliases: [mn]

permissions:
  maliness-core.heal.use:
    description: Kendi canını yeniler.
    default: op
  maliness-core.heal.use.others:
    description: Başka oyuncuların canını yeniler.
    default: op
  maliness-core.feed.use:
    description: Kendi açlığını giderir.
    default: op
  maliness-core.feed.use.others:
    description: Başka oyuncuların açlığını giderir.
    default: op
  maliness-core.health.use:
    description: Oyuncu canını ayarlar, ekler veya azaltır.
    default: op
  maliness-core.hunger.use:
    description: Oyuncu açlığını ayarlar, ekler veya azaltır.
    default: op
  maliness-core.saturate.use:
    description: Kendi doygunluğunu doldurur ve açlığını giderir.
    default: op
  maliness-core.saturate.use.others:
    description: Başka oyuncuların doygunluğunu doldurur ve açlığını giderir.
    default: op
  maliness-core.saturation.use:
    description: Oyuncu doygunluğunu ayarlar, ekler veya azaltır.
    default: op
  maliness-core.god.use:
    description: Kendi god modunu açar veya kapatır.
    default: op
  maliness-core.god.use.others:
    description: Başka oyuncuların god modunu yönetir.
    default: op
  maliness-core.home.use:
    description: Eve ışınlanır.
    default: true
  maliness-core.home.sethome:
    description: Ev kaydeder.
    default: true
  maliness-core.home.delhome:
    description: Evi siler.
    default: true
  maliness-core.home.homes:
    description: Evleri listeler.
    default: true
  maliness-core.home.rename:
    description: Ev adını değiştirir.
    default: true
  maliness-core.home.bypasstime:
    description: Eve ışınlanma bekleme süresini atlar.
    default: op
  maliness-core.home.others.list:
    description: Başka oyuncuların evlerini listeler.
    default: op
  maliness-core.home.others.teleport:
    description: Başka oyuncuların evlerine ışınlanır.
    default: op
  maliness-core.home.others.delete:
    description: Başka oyuncuların evlerini siler.
    default: op
  maliness-core.home.invalid-home.broadcast:
    description: Geçersiz ev verisi atlandığında oyun içi uyarı alır.
    default: op
  maliness-core.home.count.*:
    description: Ev limiti (örn. maliness-core.home.count.3 = en fazla 3 ev).
    default: false
  maliness-core.confirm.use:
    description: Onay komutlarını kullanır (/evet, /hayır, /iptal).
    default: true
  maliness-core.reload:
    description: Config ve lang dosyalarını yeniden yükler.
    default: op
  maliness-core.systems.list:
    description: Oyun sistemleri listesini görüntüler.
    default: op
  maliness-core.systems.manage.*:
    description: Tüm oyun sistemlerini açıp kapatır.
    default: op
  maliness-core.systems.manage.heal:
    description: İyileştirme sistemini açıp kapatır.
    default: op
  maliness-core.systems.manage.feed:
    description: Doyurma sistemini açıp kapatır.
    default: op
  maliness-core.systems.manage.health:
    description: Can sistemini açıp kapatır.
    default: op
  maliness-core.systems.manage.hunger:
    description: Açlık sistemini açıp kapatır.
    default: op
  maliness-core.systems.manage.saturate:
    description: Doygunluk sistemini açıp kapatır.
    default: op
  maliness-core.systems.manage.saturation:
    description: Doygunluk değeri sistemini açıp kapatır.
    default: op
  maliness-core.systems.manage.god:
    description: God sistemini açıp kapatır.
    default: op
  maliness-core.systems.manage.home:
    description: Ev sistemini açıp kapatır.
    default: op
  maliness-core.playtime.use:
    description: Kendi oynama süresini görüntüler.
    default: true
  maliness-core.playtime.use.others:
    description: Başka oyuncuların oynama süresini görüntüler.
    default: op
  maliness-core.broadcast.use:
    description: Sunucu duyurusu gönderir.
    default: op
  maliness-core.colors.use:
    description: MaliNess renk kodlarını kullanır (&, &#, &z).
    default: op
  maliness-core.vanish.use:
    description: Kendi gizli modunu yönetir.
    default: op
  maliness-core.vanish.use.others:
    description: Başka oyuncuların gizli modunu yönetir.
    default: op
  maliness-core.vanish.see:
    description: Gizli oyuncuları görür ve listeler.
    default: op
  maliness-core.systems.manage.playtime:
    description: Oynama süresi sistemini açıp kapatır.
    default: op
  maliness-core.systems.manage.broadcast:
    description: Duyuru sistemini açıp kapatır.
    default: op
  maliness-core.systems.manage.vanish:
    description: Vanish sistemini açıp kapatır.
    default: op
