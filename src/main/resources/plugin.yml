name: MaliNess-Core
description: MaliNess Network çekirdek eklentisi.
version: '${project.version}'

main: com.mertaliakcay.malinesscore.MaliNessCore
api-version: '1.21.4'
load: POSTWORLD

authors: [ Mert Ali AKÇAY ]
website: https://github.com/MaliWhiteTea/MaliNess-Core

commands:
  maliness:
    description: MaliNess Network komutlari.
    usage: /maliness <heal>
    aliases: [mn]

permissions:
  maliness-core.heal.use:
    description: Kendi canını yeniler.
    default: op
  maliness-core.heal.use.others:
    description: Başka oyuncuların canını yeniler.
    default: op
