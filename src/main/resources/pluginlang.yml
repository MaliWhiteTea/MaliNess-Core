# MaliNess Core - Ana mesajlar
# Renkler ve prefix config.yml dosyasından otomatik uygulanır.

plugin-enabled:
  type: success
  text: "MaliNess Core aktif!"

plugin-disabled:
  type: normal
  text: "MaliNess Core kapatıldı."

systems-enabled-summary:
  type: success
  text: "Aktif edilen sistemler: {systems}"

systems-disabled-summary:
  type: normal
  text: "Deaktif edilen sistemler: {systems}"

systems-shutdown-summary:
  type: normal
  text: "Kapatılan sistemler: {systems}"

system-enable-failed:
  type: error
  text: "{system} sistemi aktif edilemedi: {error}"

system-disable-failed:
  type: error
  text: "{system} sistemi kapatılamadı: {error}"

mn-root-usage:
  type: normal
  text: "Kullanım: /mn <reload|heal|feed|health|hunger|home|sethome|...> ..."

mn-help-header:
  type: normal
  text: "Kullanabileceğin komutlar:"

mn-help-empty:
  type: warning
  text: "Kullanabileceğin komut yok."

mn-help-entry:
  type: normal
  text: "• {command}"

mn-help-hover:
  type: normal
  text: "{description}\n\nMN: {mn}\nDirekt: {direct}"

mn-help-desc-reload:
  text: "Config ve lang dosyalarini yeniden yukler."

mn-help-desc-heal:
  text: "Canini veya baska oyuncunun canini yeniler."

mn-help-desc-feed:
  text: "Acligini veya baska oyuncunun acligini giderir."

mn-help-desc-health:
  text: "Oyuncu canini ayarlar, ekler veya azaltir."

mn-help-desc-hunger:
  text: "Oyuncu acligini ayarlar, ekler veya azaltir."

mn-help-desc-saturate:
  text: "Doygunlugunu doldurur ve acligini giderir."

mn-help-desc-saturation:
  text: "Oyuncu doygunlugunu ayarlar, ekler veya azaltir."

mn-help-desc-god:
  text: "God modunu acar veya kapatir."

mn-help-desc-sethome:
  text: "Bulundugun konumu ev olarak kaydeder."

mn-help-desc-home:
  text: "Kayitli evine veya baska oyuncunun evine isinlanir."

mn-help-desc-delhome:
  text: "Kayitli evini veya baska oyuncunun evini siler."

mn-help-desc-homes:
  text: "Evlerini veya baska oyuncunun evlerini listeler."

mn-help-desc-renamehome:
  text: "Ev adini degistirir."

mn-help-nav-prev:
  type: normal
  text: "<"

mn-help-nav-prev-hover:
  type: normal
  text: "Onceki sayfa"

mn-help-nav-prev-disabled:
  type: normal
  text: "<"

mn-help-nav-page:
  type: normal
  text: "Sayfa {current}/{total}"

mn-help-nav-next:
  type: normal
  text: ">"

mn-help-nav-next-hover:
  type: normal
  text: "Sonraki sayfa"

mn-help-nav-next-disabled:
  type: normal
  text: ">"

mn-unknown-subcommand:
  type: error
  text: "{subcommand} adlı alt komut bulunamadı."

reload-success:
  type: success
  text: "MaliNess Core yeniden yüklendi."

reload-no-permission:
  type: error
  text: "Eklentiyi yeniden yükleme yetkin yok!"

confirm-button-yes:
  type: success
  text: "[/evet]"

confirm-button-yes-hover:
  type: normal
  text: "Onaylamak icin tikla (/evet)"

confirm-button-no:
  type: error
  text: "[/hayır]"

confirm-button-no-hover:
  type: normal
  text: "Reddetmek icin tikla (/hayir)"

confirm-button-cancel:
  type: warning
  text: "[/iptal]"

confirm-button-cancel-hover:
  type: normal
  text: "Islemi iptal etmek icin tikla (/iptal)"

confirm-reference-code:
  type: normal
  text: "Referans kodu: {code}"

confirm-pending-code:
  type: normal
  text: "Bekleyen onay kodun: {code} — /evet {code} veya /hayır {code}"

confirm-accepted:
  type: success
  text: "Onaylandı."

confirm-failed:
  type: error
  text: "Onay islemi tamamlanamadi. Lutfen tekrar dene."

confirm-denied:
  type: warning
  text: "İşlem reddedildi."

confirm-cancelled:
  type: warning
  text: "Bekleyen işlem iptal edildi."

confirm-nothing-pending:
  type: warning
  text: "Bekleyen bir onayın yok."

confirm-expired:
  type: warning
  text: "Onay süresi doldu."

confirm-invalid-token:
  type: error
  text: "Geçersiz onay kodu."

confirm-usage-yes:
  type: warning
  text: "Kullanım: /evet <kod> veya mesajdaki butona tıkla."

confirm-usage-no:
  type: warning
  text: "Kullanım: /hayır <kod> veya mesajdaki butona tıkla."
